<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Beer Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Craft Beer</h1>

    <div class="content">

        <label>Amount Wanted</label>

        <div class="amountBox">
            <button class="amountBtn" onclick="changeAmount(-10)">−</button>

            <div id="amountDisplay">10</div>

            <button class="amountBtn" onclick="changeAmount(10)">+</button>
        </div>

        <button class="calculateBtn" onclick="calculate()">
            CALCULATE
        </button>

        <div id="results"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
